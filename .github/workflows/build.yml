name: package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify release tag matches crate version
        if: github.event_name == 'push' && github.ref_type == 'tag'
        shell: bash
        run: |
          set -euo pipefail
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "imagegen") | .version')"
          if [[ "$GITHUB_REF_NAME" != "v$version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match crate version $version" >&2
            exit 1
          fi
      - run: cargo fmt --check
      - run: cargo test --locked
      - run: cargo build --release --locked

  package:
    name: package-${{ matrix.target }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: imagegenexpert-linux-x86_64
            binary: imagegen
            archive: imagegenexpert-linux-x86_64.zip
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: imagegenexpert-macos-x86_64
            binary: imagegen
            archive: imagegenexpert-macos-x86_64.zip
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: imagegenexpert-macos-aarch64
            binary: imagegen
            archive: imagegenexpert-macos-aarch64.zip
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: imagegenexpert-windows-x86_64
            binary: imagegen.exe
            archive: imagegenexpert-windows-x86_64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools
      - run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Verify static Linux binary
        if: matrix.target == 'x86_64-unknown-linux-musl'
        shell: bash
        run: |
          set -euo pipefail
          binary="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          if readelf -l "$binary" | grep -q 'Requesting program interpreter'; then
            echo "Linux release binary is dynamically linked" >&2
            exit 1
          fi
          "$binary" --version

      - name: Stage skill package
        shell: bash
        env:
          IMAGEGEN_BIN_OVERRIDE: target/${{ matrix.target }}/release/${{ matrix.binary }}
          IMAGEGEN_OUTPUT_BINARY: ${{ matrix.binary }}
        run: bash scripts/package_skill.sh dist/imagegenexpert

      - name: Create zip package
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          zip -r "../${{ matrix.archive }}" imagegenexpert

      - name: Create zip package
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/imagegenexpert -DestinationPath ${{ matrix.archive }} -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.archive }}

  release:
    name: release
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: imagegenexpert-*
          path: release-assets
          merge-multiple: true
      - name: Validate release assets
        run: bash scripts/verify_release_assets.sh release-assets
      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mapfile -t assets < <(find release-assets -maxdepth 1 -type f -name '*.zip' -print | LC_ALL=C sort)
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${assets[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${assets[@]}" \
              --verify-tag \
              --generate-notes \
              --title "ImageGen Expert $TAG_NAME"
          fi
